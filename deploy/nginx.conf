# =============================================================================
# NexusLine GRC — nginx reverse proxy (mounted at /etc/nginx/nginx.conf)
#
#   :80   -> 301 redirect to https
#   :443  -> TLS termination; then
#             /api/  -> api:8000   (the /api prefix is PRESERVED; FastAPI serves
#                                    routes under /api/v1/...)
#             /      -> web:3000   (Next.js frontend)
#
# TLS material is expected at /etc/nginx/tls/  (host: ./deploy/tls/):
#   fullchain.pem  — server cert (+ chain)
#   privkey.pem    — private key
# For a pilot you may use a self-signed pair; see docs/deployment.md.
# =============================================================================

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    # Uploads (evidence, attachments) — keep in step with the app's MAX_UPLOAD_MB.
    client_max_body_size 30m;

    # --- gzip ------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # WebSocket upgrade plumbing (safe no-op for plain HTTP requests).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream nexusline_api {
        server api:8000;
        keepalive 32;
    }

    upstream nexusline_web {
        server web:3000;
        keepalive 32;
    }

    # --- HTTP: force everything to HTTPS --------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS: TLS termination + reverse proxy -------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (HSTS is safe once real certs are in place).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Shared proxy headers.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # --- API: preserve the /api prefix so it reaches /api/v1/... ----------
        # No trailing slash / URI on proxy_pass => the original URI (incl. /api)
        # is passed through unchanged.
        location /api/ {
            proxy_pass http://nexusline_api;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # --- Frontend (Next.js) -----------------------------------------------
        location / {
            proxy_pass http://nexusline_web;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
