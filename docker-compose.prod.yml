# =============================================================================
# NexusLine GRC — PRODUCTION / ON-PREM compose (standalone)
#
# Hardened profile for on-premise (often air-gapped) bank deployments:
#   - restart: unless-stopped everywhere
#   - Postgres NOT published to the host (reachable only over the compose network)
#   - resource limit hints, healthchecks, dependency ordering
#   - nginx reverse proxy terminating TLS on 443 (80 -> 443 redirect)
#   - persistent named volumes: pgdata, redisdata, and appdata mounted at /data
#     (holds uploads + backups so they survive container recreation)
#
# Bring up:   docker compose -f docker-compose.prod.yml up -d
# Config:     copy .env.example -> .env and edit (see docs/deployment.md)
#
# Env interpolation (${VAR:-default}) is read from the compose `.env` file /
# shell; env_file injects the same file into the container. Set real values in
# .env before first boot. Do NOT commit a populated .env.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Intentionally NO `ports:` — the database is reachable only over the internal
    # compose network. To inspect from the host, tunnel or add a temporary mapping.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis} -d ${POSTGRES_DB:-aegis}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Enable AOF so the cache/queue state survives a restart.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  api:
    build: ./backend
    image: ${API_IMAGE:-nexusline-api:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # --- wiring to the other services (fixed on the compose network) ---
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      # --- persistent file storage + backups land inside the /data volume ---
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR:-/data/uploads}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
      # --- offline licensing (Ed25519, no phone-home) ---
      ENFORCE_LICENSE: ${ENFORCE_LICENSE:-false}
      LICENSE_FILE: ${LICENSE_FILE:-/app/deploy/license.key}
      LICENSE_PUBLIC_KEY_PATH: ${LICENSE_PUBLIC_KEY_PATH:-/app/deploy/license_pubkey.pem}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-on-prem}
      # --- outbound email ---
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-NexusLine GRC <no-reply@nexusline.local>}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # --- identity / governance controls (banking baseline) ---
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      MFA_REQUIRED: ${MFA_REQUIRED:-false}
      ENFORCE_SEGREGATION_OF_DUTIES: ${ENFORCE_SEGREGATION_OF_DUTIES:-true}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
    volumes:
      - appdata:/data
      # License key + public key are read from ./deploy/ (mounted read-only).
      - ./deploy:/app/deploy:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # NOTE: python:3.12-slim ships no curl/wget, so we probe /health with the
    # stdlib. Semantically identical to `curl -f http://localhost:8000/health`.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)\""
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://localhost}
    image: ${WEB_IMAGE:-nexusline-web:latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://localhost}
    depends_on:
      - api
    # No published ports — nginx is the only public entry point.
    # node:20-alpine ships busybox wget; probe the web root. Use 127.0.0.1, not
    # localhost — Alpine/musl resolves "localhost" to ::1 only, but the standalone
    # Next.js server binds the IPv4 wildcard (HOSTNAME=0.0.0.0), so wget's IPv6
    # attempt gets "Connection refused" even though the app is up and healthy.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    # Host-published ports default to 80/443. Override HTTP_PORT/HTTPS_PORT in
    # .env when those are already taken on a shared host (e.g. another app on the
    # same box) — e.g. HTTP_PORT=8080, HTTPS_PORT=8443. The container always
    # listens on 80/443 internally; only the host mapping changes.
    ports:
      - "${HTTP_PORT:-80}:80"     # HTTP -> redirected to HTTPS
      - "${HTTPS_PORT:-443}:443"  # TLS terminates here
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/tls:/etc/nginx/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --no-check-certificate https://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  pgdata:
  redisdata:
  appdata:
